name: Pull request control approval

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

jobs:
  approve:
    if: >
      !github.event.pull_request.draft &&
      github.actor != vars.APPROVER_USERNAME
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Approve pull request control
        env:
          GH_TOKEN: ${{ secrets.APPROVER_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          messages=(
            "Approved"
            "LGTM"
            "Looks good"
            "Looks good to me"
            "Good to go"
            "Ready to merge"
            "Approved, looks good"
            "This looks good"
            "Looks solid"
            "All good"
          )
          body="${messages[$RANDOM % ${#messages[@]}]}"
          gh pr review "$PR_URL" --approve --body "$body"
